name: Deploy Mom Calendar to PocketHost

on:
  push:
    branches:
      - "release/mom-calendar"
  workflow_dispatch:

concurrency:
  group: mom-calendar-pockethost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PHIO_HOME: /tmp/phio
      PHIO_INSTANCE_NAME: ${{ secrets.PHIO_INSTANCE_NAME }}
      PHIO_PASSWORD: ${{ secrets.PHIO_PASSWORD }}
      PHIO_USERNAME: ${{ secrets.PHIO_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install PHIO
        run: npm i -g tsx phio@0.4.0

      - name: Restore PHIO deploy key
        env:
          PHIO_DEPLOY_KEY_B64: ${{ secrets.PHIO_DEPLOY_KEY_B64 }}
        run: |
          if [ -z "$PHIO_DEPLOY_KEY_B64" ]; then
            echo "Missing GitHub secret: PHIO_DEPLOY_KEY_B64"
            exit 1
          fi

          mkdir -p "$PHIO_HOME"
          printf '%s' "$PHIO_DEPLOY_KEY_B64" | base64 -d > "$PHIO_HOME/phio_deploy_ed25519"
          chmod 600 "$PHIO_HOME/phio_deploy_ed25519"
          ssh-keygen -y -f "$PHIO_HOME/phio_deploy_ed25519" > "$PHIO_HOME/phio_deploy_ed25519.pub"

      - name: Check PHIO account
        working-directory: apps/mom-calendar
        run: phio info

      - name: Deploy to PocketHost
        working-directory: apps/mom-calendar
        run: phio deploy
