name: Deploy to PocketHost

on:
  push:
    branches:
      - "release/mom-calendar"
  workflow_dispatch:

concurrency:
  group: mom-calendar-pockethost
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PHIO_HOME: /tmp/phio
      PHIO_INSTANCE_NAME: ${{ secrets.PHIO_INSTANCE_NAME }}
      PHIO_PASSWORD: ${{ secrets.PHIO_PASSWORD }}
      PHIO_USERNAME: ${{ secrets.PHIO_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare commit message
        id: prep_commit
        shell: bash
        run: |
          {
            echo "commit_message<<EOF"
            git log -1 --pretty=%B | head -n 1 | cut -c -200
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install PHIO
        run: npm i -g tsx phio@0.4.0

      - name: Install Mom Calendar runtime dependencies
        working-directory: apps/mom-calendar
        run: npm ci --omit=dev

      - name: Restore PHIO deploy key
        env:
          PHIO_DEPLOY_KEY_B64: ${{ secrets.PHIO_DEPLOY_KEY_B64 }}
        run: |
          if [ -z "$PHIO_DEPLOY_KEY_B64" ]; then
            echo "Missing GitHub secret: PHIO_DEPLOY_KEY_B64"
            exit 1
          fi

          mkdir -p "$PHIO_HOME"
          printf '%s' "$PHIO_DEPLOY_KEY_B64" | base64 -d > "$PHIO_HOME/phio_deploy_ed25519"
          chmod 600 "$PHIO_HOME/phio_deploy_ed25519"
          ssh-keygen -y -f "$PHIO_HOME/phio_deploy_ed25519" > "$PHIO_HOME/phio_deploy_ed25519.pub"

      - name: Check PHIO account
        working-directory: apps/mom-calendar
        run: phio info

      - name: Deploy to PocketHost
        working-directory: apps/mom-calendar
        run: phio deploy

      - name: Upload runtime node_modules
        working-directory: apps/mom-calendar
        run: |
          cat > "$RUNNER_TEMP/phio-node-modules.sftp" <<EOF
          cd $PHIO_INSTANCE_NAME
          -mkdir node_modules
          put -r node_modules
          put pb_hooks/pocketpages.pb.js pb_hooks/pocketpages.pb.js
          bye
          EOF

          sftp \
            -o StrictHostKeyChecking=no \
            -i "$PHIO_HOME/phio_deploy_ed25519" \
            -P 2222 \
            -b "$RUNNER_TEMP/phio-node-modules.sftp" \
            "$PHIO_USERNAME@ftp.pockethost.io"

      - name: Send Deploy Success
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Deploy Success**
            *Branch:* `${{ github.ref_name }}`
            *Service:* `mom-calendar`
            *PocketHost:* `${{ secrets.PHIO_INSTANCE_NAME }}`
            *Commit:* `${{ steps.prep_commit.outputs.commit_message }}`
            [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Send Deploy Failure
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ **Deploy Failed**
            *Branch:* `${{ github.ref_name }}`
            *Service:* `mom-calendar`
            *PocketHost:* `${{ secrets.PHIO_INSTANCE_NAME }}`
            *Commit:* `${{ steps.prep_commit.outputs.commit_message }}`
            [View Logs](https://github.com/${{ github.repository }}/actions)
