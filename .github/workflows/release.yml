name: Release Service Build

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: inseok9068

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare commit message
        id: prep_commit
        shell: bash
        run: |
          {
            echo "commit_message<<EOF"
            git log -1 --pretty=%B | head -n 1 | cut -c -200
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve service from branch
        id: svc
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SERVICE="${BRANCH_NAME#release/}"

          if [[ "$SERVICE" == "$BRANCH_NAME" || -z "$SERVICE" ]]; then
            echo "Branch must be release/<service>. current=$BRANCH_NAME"
            exit 1
          fi

          APP_DIR="apps/${SERVICE}"
          DOCKERFILE="${APP_DIR}/Dockerfile"

          if [[ ! -d "$APP_DIR" ]]; then
            echo "Service directory not found: $APP_DIR"
            exit 1
          fi

          if [[ ! -f "$DOCKERFILE" ]]; then
            echo "Dockerfile not found: $DOCKERFILE"
            exit 1
          fi

          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "compose_service=${SERVICE}-pocketpages" >> "$GITHUB_OUTPUT"
          echo "app_dir=${APP_DIR}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.svc.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.svc.outputs.image }}:${{ github.sha }}
            ${{ steps.svc.outputs.image }}:release

      - name: Restart Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_ID }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          port: 22
          script: |
            cd ./Docker-Compose
            git pull --ff-only
            docker compose pull ${{ steps.svc.outputs.compose_service }}
            docker compose stop ${{ steps.svc.outputs.compose_service }}
            deploy_owner="$(id -u):$(id -g)"
            docker compose run --rm --no-deps --entrypoint sh ${{ steps.svc.outputs.compose_service }} -c '
              set -eu
              service="$1"
              deploy_owner="$2"
              hooks_dir="/app/apps/${service}/pb_hooks"

              if [ ! -d /opt/defaults/pb_hooks ]; then
                echo "Baked hooks directory not found: /opt/defaults/pb_hooks" >&2
                exit 1
              fi

              mkdir -p "$hooks_dir"
              find "$hooks_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              cp -a /opt/defaults/pb_hooks/. "$hooks_dir"/
              chown -R "$deploy_owner" "$hooks_dir"
            ' -- ${{ steps.svc.outputs.service }} "$deploy_owner"
            docker compose up -d --no-deps --force-recreate --wait ${{ steps.svc.outputs.compose_service }}

      - name: Send Build Success
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Build Success**
            *Branch:* `${{ github.ref_name }}`
            *Service:* `${{ steps.svc.outputs.compose_service }}`
            *Commit:* `${{ steps.prep_commit.outputs.commit_message }}`
            [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Send Build Failure
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ **Build Failed**
            *Branch:* `${{ github.ref_name }}`
            *Service:* `${{ steps.svc.outputs.compose_service }}`
            *Commit:* `${{ steps.prep_commit.outputs.commit_message }}`
            [View Logs](https://github.com/${{ github.repository }}/actions)
