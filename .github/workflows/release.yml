name: Release Service Build

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: inseok9068

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare commit message
        id: prep_commit
        shell: bash
        run: |
          {
            echo "commit_message<<EOF"
            git log -1 --pretty=%B | head -n 1 | cut -c -200
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve service from branch
        id: svc
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SERVICE="${BRANCH_NAME#release/}"

          if [[ "$SERVICE" == "$BRANCH_NAME" || -z "$SERVICE" ]]; then
            echo "Branch must be release/<service>. current=$BRANCH_NAME"
            exit 1
          fi

          APP_DIR="apps/${SERVICE}"
          DOCKERFILE="${APP_DIR}/Dockerfile"

          if [[ ! -d "$APP_DIR" ]]; then
            echo "Service directory not found: $APP_DIR"
            exit 1
          fi

          if [[ ! -f "$DOCKERFILE" ]]; then
            echo "Dockerfile not found: $DOCKERFILE"
            exit 1
          fi

          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "compose_service=${SERVICE}-pocketpages" >> "$GITHUB_OUTPUT"
          echo "app_dir=${APP_DIR}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.svc.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.svc.outputs.image }}:${{ github.sha }}
            ${{ steps.svc.outputs.image }}:release

      - name: Restart Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_ID }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          port: 22
          script: |
            cd ./Docker-Compose
            docker compose pull ${{ steps.svc.outputs.compose_service }}
            docker compose up -d --no-deps --force-recreate ${{ steps.svc.outputs.compose_service }}

      - name: Send Build Success Message
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            Status: **Success**

            Branch: ${{ github.ref_name }}

            Service: ${{ steps.svc.outputs.compose_service }}

            Commit message: ${{ steps.prep_commit.outputs.commit_message }}

            [See changes](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Send Build Failure Message
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            Status: **Failure**

            Branch: ${{ github.ref_name }}

            Service: ${{ steps.svc.outputs.compose_service }}

            Commit message: ${{ steps.prep_commit.outputs.commit_message }}

            [See workflow](https://github.com/${{ github.repository }}/actions)
