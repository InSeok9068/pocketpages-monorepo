title = "PocketPages Monorepo Gitleaks"

[extend]
useDefault = true

[[allowlists]]
description = "PocketBase upstream docs contain example JWT responses."
targetRules = ["jwt"]
paths = [
  '''^\.docs/pocketbase/pocketbase_docs_js\.md$''',
]

[[allowlists]]
description = "PocketBase JSVM SDK patch files contain generated code that matches generic-api-key."
targetRules = ["generic-api-key"]
paths = [
  '''^apps/[^/]+/patches/pocketbase-js-sdk-jsvm\+0\.25\.10004\.patch$''',
]

[[allowlists]]
description = "Official PocketBase browser SDK bundles contain generated code that matches generic-api-key."
targetRules = ["generic-api-key"]
paths = [
  '''^scripts/vendor/pocketbase-0\.27\.0\.umd\.js$''',
  '''^apps/todo/pb_hooks/pages/assets/vendor/pocketbase-0\.27\.0\.umd\.js$''',
]

[[allowlists]]
description = "Seedlab Toss API docs contain example access_token fields."
targetRules = ["generic-api-key"]
paths = [
  '''^apps/seedlab/\.docs/tossapi\.json$''',
]
